apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: my-app-service:latest
        imagePullPolicy: Never
        command: ["npm", "run", "start:worker"]
        env:
        - name: REDIS_URL
          value: "redis://:password123@redis-service:6379"
        ports:
        - containerPort: 4001
        # for HPA
        resources:
          requests:
            cpu: "200m"  # 0.2 CPU core - Min requirement for the pod
          limits:
            cpu: "500m"  # 0.5 CPU core - Max cap to prevent runaway processes
