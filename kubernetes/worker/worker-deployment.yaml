apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: my-app-service:latest
        imagePullPolicy: Never
        command: ["npm", "run", "start:worker"]
        env:
        - name: REDIS_URL
          value: "redis://:password123@redis-service:6379"
        - name: WORKER_METRICS_PORT
          value: "4003"
        ports:
        - containerPort: 4003
        resources:
          requests:
            cpu: "200m"
          limits:
            cpu: "500m"
