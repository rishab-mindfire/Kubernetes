apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator-deployment
  labels:
    app: aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
    spec:
      containers:
        - name: aggregator
          image: my-app-service:latest
          imagePullPolicy: Never
          command: ["npm", "run", "start:aggregator"]
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 4002
