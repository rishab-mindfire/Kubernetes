apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator-deployment
  labels:
    app: aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z -w 2 redis-service 6379; do echo 'Waiting for Redis to be reachable...'; sleep 2; done;",
            ]
      containers:
        - name: aggregator
          image: my-app-service:v2
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/aggregator.js"]
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 4002
