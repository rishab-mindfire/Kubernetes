apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    # Security Rule: Block external public requests targeting your metrics endpoint
    nginx.ingress.kubernetes.io/configuration-snippet: |
      location ~* ^/aggregator/metrics {
          deny all;
          return 403;
      }
spec:
  ingressClassName: nginx
  rules:
  - host: my-app.local
    http:
      paths:
      # API Service Routing
      - path: /api/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-service
            port:
              number: 4001
      # Aggregator Service Routing
      - path: /aggregator/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: aggregator-service
            port:
              number: 4002
