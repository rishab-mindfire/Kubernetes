apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Capture group $1 represents everything after the service prefix
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
  - host: my-app.local
    http:
      paths:
      # Matches: /api/status/123
      - path: /api/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-service
            port:
              number: 4001
      # Matches: /aggregator/metrics
      - path: /aggregator/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: aggregator-service
            port:
              number: 4002
