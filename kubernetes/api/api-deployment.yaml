apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z -w 2 redis-service 6379; do echo 'Waiting for Redis to be reachable...'; sleep 2; done;",
            ]
      containers:
      - name: api
        image: my-app-service:latest
        imagePullPolicy: Never
        command: ["node", "dist/api.js"]
        envFrom:
        - configMapRef:
            name: app-config
        ports:
        - containerPort: 4001
