apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: my-app-service:latest
        imagePullPolicy: Never
        command: ["npm", "run", "start:api"]
        ports:
        - containerPort: 4001
        env:
        - name: REDIS_URL
          value: "redis://:password123@redis-service:6379"
        - name: API_PORT
          value: "4001"
