apiVersion: v1
kind: Service
metadata:
  name: redis-service # This is the internal DNS name other pods will use
spec:
  selector:
    app: redis # Must match the labels in the deployment above
  ports:
    - protocol: TCP
      port: 6379 # The port the service exposes to other pods
      targetPort: 6379 # The port to forward traffic to on the pod
  type: ClusterIP # Only accessible from inside the Kubernetes cluster


