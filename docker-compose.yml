version: "3.9"

services:
  # Redis DB
  redis:
    image: redis:7-alpine
    container_name: redis_server
    command: redis-server --requirepass password123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - redis-network
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      retries: 3
      timeout: 5s

   # RedisInsight Dashboard
  redis_insight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    container_name: redis_insight
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    networks:
      - redis-network

  # API Service (Service A)
  api:
    build: .
    container_name: api_service
    environment:
      - API_PORT=4001
      - REDIS_URL=redis://:password123@redis:6379
    ports:
      - "4001:4001"
    depends_on:
      - redis
    networks:
      - redis-network

  # Worker Service (Service B)
  worker:
    build: .
    container_name: worker_service
    command: npm run start:worker
    environment:
      - REDIS_URL=redis://:password123@redis:6379
    depends_on:
      - redis
    networks:
      - redis-network

  # Stats/Aggregator (Service C)
  aggregator:
    build: .
    container_name: aggregator_service
    command: npm run start:aggregator
    environment:
      - AGGREGATOR_PORT=4002
      - REDIS_URL=redis://:password123@redis:6379
    ports:
      - "4002:4002"
    depends_on:
      - redis
    networks:
      - redis-network

volumes:
  redis_data:
    driver: local
  redis_insight_data:
    driver: local

networks:
  redis-network:
    driver: bridge
