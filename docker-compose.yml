services:
  redis:
    image: redis:7-alpine
    container_name: redis_server
    command: redis-server --requirepass yourpassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: api_service
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://:yourpassword@redis:6379
    depends_on:
      - redis

  worker:
    build: .
    container_name: worker_service
    # Override the default CMD to start the worker instead of the API
    command: npm run start:worker
    environment:
      - REDIS_URL=redis://:yourpassword@redis:6379
    depends_on:
      - redis

volumes:
  redis_data:
